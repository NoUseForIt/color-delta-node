version: '3.8'

services:
  # ===== BACKEND API =====
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: color-delta-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CORS_ORIGINS=http://localhost:3000
      - MAX_FILE_SIZE=10485760
      - LOG_LEVEL=info
    volumes:
      # Persist uploads & logs
      - uploads-data:/app/uploads
      - logs-data:/app/logs
    networks:
      - color-delta-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ===== FRONTEND REACT =====
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=http://localhost:5000
    container_name: color-delta-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - color-delta-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

# ===== VOLUMES =====
volumes:
  uploads-data:
    driver: local
  logs-data:
    driver: local

# ===== NETWORK =====
networks:
  color-delta-network:
    driver: bridge
